name: 'Check version'

on:
  workflow_call:
    outputs:
      version:
        description: "version specified from VERSION"
        value: ${{ jobs.verify-version.outputs.version }}

jobs:
  verify-version:
    name: Verify VERSION has changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      version: ${{ steps.read_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: read_version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Determine whether VERSION changed
        id: verify-changed-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF"
            range="origin/$BASE_REF...HEAD"
          elif [ -n "${BEFORE_SHA:-}" ] \
            && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] \
            && git rev-parse --verify --quiet "${BEFORE_SHA}^{commit}" >/dev/null; then
            range="$BEFORE_SHA $CURRENT_SHA"
          else
            range=""
          fi
          if [ -z "$range" ]; then
            changed=true
          elif [ -n "$(git diff --name-only $range -- VERSION)" ]; then
            changed=true
          else
            changed=false
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Cancel the run if VERSION has not changed
        if: steps.verify-changed-version.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::error::VERSION has not changed. Bump the VERSION file before merging."
          gh run cancel "${{ github.run_id }}"
      - name: Fail the job if VERSION has not changed
        if: steps.verify-changed-version.outputs.changed == 'false'
        run: exit 1
